version: 2

models:
  - name: mart_weather_forecast
    description: >
      5-day hourly weather forecast per city sourced from the latest Airbyte sync.
      Deduplicates across syncs so only the most recent forecast window is shown.
      Includes rain alerts (>=70% precipitation probability) and days_from_now for
      easy Power BI time-based filtering.
    columns:
      - name: city
        tests:
          - not_null
      - name: forecast_at
        tests:
          - not_null
      - name: heavy_rain_alert
        tests:
          - not_null
    tests:
      - unique:
          column_name: "city || '|' || forecast_at::text"

  - name: mart_temperature_trends
    description: >
      Daily temperature metrics per city with 7-day and 30-day rolling averages.
      Flags anomalies when the daily temperature deviates more than 2 standard deviations
      from the 30-day mean.
    columns:
      - name: city
        tests:
          - not_null
      - name: date_utc
        tests:
          - not_null
    tests:
      - unique:
          column_name: "city || '|' || date_utc::text"

  - name: mart_aqi_monitoring
    description: >
      Daily air quality metrics per city with AQI labels, alert flags, and 7-day rolling trend.
      aqi_alert is true when hours_poor_air >= 3 (3+ hours of AQI ≥ 4 in a single day).
    columns:
      - name: city
        tests:
          - not_null
      - name: date_utc
        tests:
          - not_null
      - name: avg_aqi_label
        tests:
          - accepted_values:
              values: ['Good', 'Fair', 'Moderate', 'Poor', 'Very Poor', 'Unknown']
      - name: aqi_trend
        tests:
          - accepted_values:
              values: ['Improving', 'Worsening', 'Stable', 'Insufficient data']
    tests:
      - unique:
          column_name: "city || '|' || date_utc::text"

  - name: mart_traffic_density
    description: >
      Daily traffic congestion metrics per city with human-readable labels and 7-day rolling average.
      Covers London, Berlin, and Amsterdam (TomTom sources).
    columns:
      - name: city
        tests:
          - not_null
      - name: date_utc
        tests:
          - not_null
      - name: congestion_label
        tests:
          - accepted_values:
              values: ['Low', 'Moderate', 'High', 'Severe']
    tests:
      - unique:
          column_name: "city || '|' || date_utc::text"

  - name: mart_city_comparison
    description: >
      Wide comparison table joining weather, pollution, and traffic per city per day.
      Includes per-day city rankings for comfort, AQI, temperature, and congestion.
      Skopje will have null traffic metrics (not in TomTom coverage).
    columns:
      - name: city
        tests:
          - not_null
      - name: date_utc
        tests:
          - not_null
      - name: comfort_index_label
        tests:
          - accepted_values:
              values: ['Excellent', 'Good', 'Fair', 'Poor']
    tests:
      - unique:
          column_name: "city || '|' || date_utc::text"

  - name: mart_smart_city_kpis
    description: >
      Headline KPI table for Metabase dashboards. One row per city per day with composite
      comfort/livability score, alert flags, labels, and 7-day rolling trend.
    columns:
      - name: city
        tests:
          - not_null
      - name: date_utc
        tests:
          - not_null
      - name: comfort_index
        tests:
          - not_null
      - name: comfort_index_label
        tests:
          - accepted_values:
              values: ['Excellent', 'Good', 'Fair', 'Poor']
      - name: congestion_label
        tests:
          - accepted_values:
              values: ['Low', 'Moderate', 'High', 'Severe', 'No data']
      - name: comfort_trend
        tests:
          - accepted_values:
              values: ['Improving', 'Worsening', 'Stable', 'Insufficient data']
    tests:
      - unique:
          column_name: "city || '|' || date_utc::text"
