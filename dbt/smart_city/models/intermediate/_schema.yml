version: 2

models:
  # ── Hourly facts (incremental, append-only — the durable history) ──────────
  - name: int_city_hourly_weather
    description: >
      Durable hourly per-city weather facts. One row per real observation
      (city, observed_at), deduped from staging and accumulated incrementally so
      hourly history survives airbyte_raw pruning. Source for the daily rollup.
    columns:
      - name: city_hour_key
        description: Surrogate key — md5(city|observed_at). Primary key of this table.
        tests:
          - unique
          - not_null
      - name: city
        tests: [not_null]
      - name: observed_at
        tests: [not_null]

  - name: int_city_hourly_pollution
    description: >
      Durable hourly per-city air-quality facts. One row per real observation
      (city, observed_at), deduped and accumulated incrementally. Source for the
      daily rollup.
    columns:
      - name: city_hour_key
        description: Surrogate key — md5(city|observed_at). Primary key of this table.
        tests:
          - unique
          - not_null
      - name: city
        tests: [not_null]
      - name: observed_at
        tests: [not_null]
      - name: aqi
        tests: [not_null]

  - name: int_city_hourly_traffic_flow
    description: >
      Durable hourly per-city traffic-flow facts. One row per sync snapshot
      (city, observed_at) — observed_at is Airbyte sync time (TomTom flow has no
      event timestamp). Deduped and accumulated incrementally.
    columns:
      - name: city_hour_key
        description: Surrogate key — md5(city|observed_at). Primary key of this table.
        tests:
          - unique
          - not_null
      - name: city
        tests: [not_null]
      - name: observed_at
        tests: [not_null]

  - name: int_city_hourly_traffic_incidents
    description: >
      Durable hourly per-city traffic-incident facts. One row per incident per
      sync (city, incident_id, observed_at) — observed_at is Airbyte sync time.
      Deduped and accumulated incrementally.
    columns:
      - name: city_incident_key
        description: Surrogate key — md5(city|incident_id|observed_at). Primary key.
        tests:
          - unique
          - not_null
      - name: city
        tests: [not_null]
      - name: observed_at
        tests: [not_null]

  # ── Daily rollups (table, rebuilt from the hourly facts) ───────────────────
  - name: int_city_daily_weather
    description: >
      Daily per-city weather aggregates. Deduped from hourly staging snapshots on
      (city, observed_at), then rolled up to one row per (city, date_utc).
    columns:
      - name: city_date_key
        description: Surrogate key — md5(city|date_utc). Primary key of this table.
        tests:
          - unique
          - not_null
      - name: city
        tests: [not_null]
      - name: date_utc
        tests: [not_null]

  - name: int_city_daily_pollution
    description: >
      Daily per-city air-quality aggregates. Deduped from hourly staging snapshots on
      (city, observed_at), then rolled up to one row per (city, date_utc).
    columns:
      - name: city_date_key
        description: Surrogate key — md5(city|date_utc). Primary key of this table.
        tests:
          - unique
          - not_null
      - name: city
        tests: [not_null]
      - name: date_utc
        tests: [not_null]
      - name: avg_aqi
        tests: [not_null]

  - name: int_city_daily_traffic
    description: >
      Daily per-city traffic flow + incident aggregates. Flow deduped on
      (city, observed_at); incidents on (city, incident_id, observed_at). One row
      per (city, date_utc). observed_at is sync time (no real event timestamp).
    columns:
      - name: city_date_key
        description: Surrogate key — md5(city|date_utc). Primary key of this table.
        tests:
          - unique
          - not_null
      - name: city
        tests: [not_null]
      - name: date_utc
        tests: [not_null]

  # ── Forecast (issue history + latest + accuracy) ───────────────────────────
  - name: int_city_weather_forecast
    description: >
      Durable forecast issue-history. One row per prediction issuance
      (city, forecast_at, issued_at) — append-only (incremental), so predictions
      persist past raw pruning and can be scored for accuracy. issued_at is the
      sync time; lead_time_hours = forecast_at - issued_at.
    columns:
      - name: forecast_key
        description: Surrogate key — md5(city|forecast_at|issued_at). Primary key.
        tests:
          - unique
          - not_null
      - name: city
        tests: [not_null]
      - name: forecast_at
        tests: [not_null]
      - name: issued_at
        tests: [not_null]

  - name: int_city_forecast_latest
    description: >
      Current forecast — latest-issued prediction per (city, forecast_at), future
      slots only. Forward-looking "what's the 5-day forecast" view.
    columns:
      - name: forecast_slot_key
        description: Surrogate key — md5(city|forecast_at). Primary key.
        tests:
          - unique
          - not_null
      - name: city
        tests: [not_null]
      - name: forecast_at
        tests: [not_null]

  - name: int_city_forecast_accuracy
    description: >
      Past predictions scored against observed weather (int_city_hourly_weather),
      joined on (city, hour). One row per scoreable prediction with temp error,
      rain hit/miss, and condition match, sliced by lead time.
    columns:
      - name: forecast_key
        description: Surrogate key from the issue history — md5(city|forecast_at|issued_at).
        tests: [not_null]
      - name: city
        tests: [not_null]
      - name: forecast_at
        tests: [not_null]
