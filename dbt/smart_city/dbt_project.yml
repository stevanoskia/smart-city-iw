name: 'smart_city'
version: '1.0.0'
profile: 'smart_city'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

# Where `dbt deps` installs packages. Host: default 'dbt_packages'. In the Airflow
# container a persistent named volume is mounted AT .../dbt_packages, and dbt can't
# rmtree its own install path when that path is a mount point (Errno 16, "Device or
# resource busy"). So there we set DBT_PACKAGES_PATH=dbt_packages/lib — a subdir INSIDE
# the volume that dbt can freely delete/recreate. See docker-compose.yml + CLAUDE.md.
packages-install-path: "{{ env_var('DBT_PACKAGES_PATH', 'dbt_packages') }}"

clean-targets:
  - "target"  
  - "dbt_packages"

models:
  smart_city:
    staging:
      # Ephemeral: stg_* parsing SQL compiles inline into int_*/dim_city as CTEs —
      # no DB object. The `staging` schema itself holds only Airbyte's raw JSON tables.
      +materialized: ephemeral
    intermediate:
      +materialized: table
      +schema: intermediate
    marts:
      # Default = table (used by the 3 dims + the rolling-window and forward-looking marts).
      # The 8 append-only facts override this to materialized='incremental' (delete+insert)
      # in their own config() block — see each model header and CLAUDE.md "Marts materialization".
      +materialized: table
      +schema: marts

