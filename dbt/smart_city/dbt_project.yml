name: 'smart_city'
version: '1.0.0'
profile: 'smart_city'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"  
  - "dbt_packages"

models:
  smart_city:
    staging:
      # Ephemeral: stg_* parsing SQL compiles inline into int_*/dim_city as CTEs —
      # no DB object. The `staging` schema itself holds only Airbyte's raw JSON tables.
      +materialized: ephemeral
    intermediate:
      +materialized: table
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

