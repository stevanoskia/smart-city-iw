x-airflow-common: &airflow-common
  build: .
  env_file:
    - ../.env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    # Smart city DB connection (used by dbt staging target inside container).
    # Only HOST needs a container-specific override (host.docker.internal to
    # reach the Windows host) — PORT/DB/USER/PASSWORD are the same values
    # regardless of who's asking, so profiles.yml reads them straight from
    # POSTGRES_* (already injected via env_file above).
    SMART_CITY_PG_HOST: host.docker.internal
    # Airbyte OAuth credentials (used by airbyte_utils.py in DAGs)
    AIRBYTE_URL: 'http://host.docker.internal:8000'
    AIRBYTE_CLIENT_ID: ${AIRBYTE_CLIENT_ID}
    AIRBYTE_CLIENT_SECRET: ${AIRBYTE_CLIENT_SECRET}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ../dbt:/opt/airflow/dbt
    - ../ingestion/config:/opt/airflow/ingestion_config
  depends_on:
    airflow-postgres:
      condition: service_healthy

services:
  airflow-postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler

  airflow-init:
    <<: *airflow-common
    command: bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@smartcity.local || true"
    restart: "no"
